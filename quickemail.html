<link rel="stylesheet" href="static/quickemail.css">
<link rel="stylesheet" href="static/custom.css">

<div id="quickemail">
	<div class="container">
		<form action="">
			<div class="field_area">
				<label for="name_field">Name</label>
				<input type="text" name="" id="name_field"
				class="name" placeholder="Your Name">
			</div>
			<div class="field_area">
				<label for="phone_field">Phone</label>
				<input type="text" name="" id="phone_field" class="phone" placeholder="Your phone number">
			</div>
			<div class="field_area">
				<label for="email_field">Email</label>
				<input type="text" name="" id="email_field"
				class="email" placeholder="Your working email">
			</div>
			<div class="field_area">
				<label for="message_field">Message</label>
				<input type="text" name="" id="message_field" class="message" placeholder="Your message">
			</div>
			<div class="field_area">
				<input type="checkbox" name="" id="">I agree to receive communications from Createx Construction Bureau.
			</div>
			<div class="field_area">
				<input type="submit" value="SEND REQUEST">
			</div>
			<button></button>
		</form>
	</div>
</div>
